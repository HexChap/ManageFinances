services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ManageFinancesITKariera
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  backend:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /src
    volumes:
      - ./backend:/src
      - nuget-cache:/root/.nuget
    command: dotnet watch run --project backend.csproj --urls http://+:8080
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Database=ManageFinancesITKariera;Username=postgres;Password=postgres"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: oven/bun:1
    working_dir: /app
    volumes:
      - ./frontend:/app
      - bun-cache:/root/.bun
    command: bun run dev --host
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  nuget-cache:
  bun-cache:
